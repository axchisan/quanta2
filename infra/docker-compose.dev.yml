# Compose de desarrollo para validar el empaquetado Docker.
# Build context = raíz del monorepo (necesita el workspace pnpm).
#   docker compose -f infra/docker-compose.dev.yml up --build
#
# Supabase NO está acá: se levanta con `pnpm --filter @quanta/db db:start`.
# El servicio `web` se añade cuando exista `apps/web/Dockerfile` (backlog).

services:
  game-server:
    container_name: quanta-game-server
    build:
      context: ..
      dockerfile: apps/game-server/Dockerfile
    environment:
      GAME_SERVER_PORT: 2567
    ports:
      - '2567:2567'
    restart: unless-stopped
