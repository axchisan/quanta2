# Compose de desarrollo para validar el empaquetado Docker de las apps.
# Build context = raíz del monorepo (necesita el workspace pnpm).
#   docker compose -f infra/docker-compose.dev.yml up --build
#
# Supabase NO está acá: se levanta aparte con `pnpm --filter @quanta/db db:start`.
# Ambas imágenes están verificadas (build + run) con Docker 29.5.

services:
  web:
    container_name: quanta-web
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: 3000
    ports:
      - '3000:3000'
    restart: unless-stopped

  game-server:
    container_name: quanta-game-server
    build:
      context: ..
      dockerfile: apps/game-server/Dockerfile
    environment:
      GAME_SERVER_PORT: 2567
    ports:
      - '2567:2567'
    restart: unless-stopped
